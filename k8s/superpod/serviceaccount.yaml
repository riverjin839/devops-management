apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-monitor-agent
  namespace: k8s-monitor-agent
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8s-monitor-agent-deepcheck
rules:
  - apiGroups: [""]
    resources: [nodes, pods, services, endpoints, namespaces, componentstatuses,
                persistentvolumes, persistentvolumeclaims, events, configmaps,
                serviceaccounts]
    verbs: [get, list, watch]
  - apiGroups: ["apps"]
    resources: [deployments, statefulsets, daemonsets, replicasets]
    verbs: [get, list, watch]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: [rolebindings, clusterrolebindings]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [pods/log]
    verbs: [get]
  - apiGroups: [""]
    resources: [pods/exec]
    verbs: [create, get]
  - nonResourceURLs: ["/healthz", "/livez", "/readyz", "/healthz/*", "/livez/*", "/readyz/*"]
    verbs: [get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-monitor-agent-deepcheck-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: k8s-monitor-agent-deepcheck
subjects:
  - kind: ServiceAccount
    name: k8s-monitor-agent
    namespace: k8s-monitor-agent
