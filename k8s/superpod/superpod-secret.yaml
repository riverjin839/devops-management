apiVersion: v1
kind: Secret
metadata:
  name: superpod-ingest
  namespace: k8s-monitor-agent
type: Opaque
stringData:
  # PATCH BEFORE APPLY — pointer to the management backend.
  SUPERPOD_INGEST_URL: "https://k8s-monitor.example.com/api/v1"
  # PATCH BEFORE APPLY — must match settings.superpod_ingest_token on backend.
  SUPERPOD_INGEST_TOKEN: "REPLACE_WITH_SHARED_BEARER_TOKEN"
  # Set to "false" only when ingesting into a self-signed dev backend.
  SUPERPOD_VERIFY_SSL: "true"
