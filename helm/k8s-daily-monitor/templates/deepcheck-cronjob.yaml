{{- if .Values.deepcheck.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: deepcheck
  labels:
    app.kubernetes.io/name: deepcheck
    app.kubernetes.io/component: deepcheck
    {{- include "k8s-daily-monitor.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.deepcheck.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: deepcheck
            app.kubernetes.io/component: deepcheck
        spec:
          restartPolicy: OnFailure
          serviceAccountName: {{ .Values.serviceAccount.name }}
          {{- with .Values.global.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          containers:
            - name: deepcheck
              image: {{ include "k8s-daily-monitor.image" (dict "global" .Values.global "repository" .Values.backend.image.repository "tag" .Values.backend.image.tag) }}
              imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
              command: ["python", "-m", "app.superpod.runner", "--mode", "centralized"]
              envFrom:
                - configMapRef:
                    name: k8s-monitor-config
                - secretRef:
                    name: k8s-monitor-secret
              resources:
                {{- toYaml .Values.deepcheck.resources | nindent 16 }}
              volumeMounts:
                - name: kubeconfig
                  mountPath: /root/.kube
                  readOnly: true
          volumes:
            - name: kubeconfig
              secret:
                secretName: kubeconfig-secret
                optional: true
{{- end }}
